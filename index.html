<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R3 Dienstplan</title>
<style>
:root{
  --bg:#0d1117;--bg2:#161b27;--bg3:#1e2638;
  --brd:rgba(255,255,255,.07);--brd2:rgba(255,255,255,.13);
  --acc:#7c3aed;--acc2:#8b5cf6;--acc-l:rgba(124,58,237,.18);
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;
  --suc:#10b981;--suc-l:rgba(16,185,129,.15);
  --war:#f59e0b;--war-l:rgba(245,158,11,.15);
  --dan:#ef4444;--dan-l:rgba(239,68,68,.15);
  --r:8px;--rl:12px;
  --sh:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shm:0 4px 20px rgba(0,0,0,.4);
  --shl:0 10px 40px rgba(0,0,0,.5);
  --nav-h:56px;
  --trans:.15s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ‚îÄ‚îÄ SCROLLBAR ‚îÄ‚îÄ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}

/* ‚îÄ‚îÄ LOGIN ‚îÄ‚îÄ */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.login-box{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);padding:36px;width:100%;max-width:380px;box-shadow:var(--shl)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo-icon{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.login-logo-text{font-size:20px;font-weight:800;color:var(--txt);letter-spacing:-.5px}
.login-logo-sub{font-size:11px;color:var(--txt3);font-weight:500;margin-top:1px}
.login-title{font-size:22px;font-weight:800;color:var(--txt);margin-bottom:4px;letter-spacing:-.3px}
.login-sub{font-size:13px;color:var(--txt2);margin-bottom:24px}

/* ‚îÄ‚îÄ TOP NAV ‚îÄ‚îÄ */
.topnav{height:var(--nav-h);background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:0;padding:0 20px;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;margin-right:24px;flex-shrink:0;text-decoration:none}
.nav-logo-icon{width:32px;height:32px;border-radius:8px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff}
.nav-logo-name{font-size:15px;font-weight:800;color:var(--txt);letter-spacing:-.3px}
.nav-tabs{display:flex;gap:1px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:0 14px;height:var(--nav-h);display:flex;align-items:center;gap:7px;border:none;background:transparent;color:var(--txt2);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);position:relative;top:1px}
.nav-tab:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.nav-tab.active{color:var(--acc2);border-bottom-color:var(--acc2);background:rgba(139,92,246,.07)}
.nav-sep{width:1px;height:24px;background:var(--brd);margin:0 8px;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}

/* ‚îÄ‚îÄ CONTENT ‚îÄ‚îÄ */
.content{padding:28px 24px;max-width:1100px;margin:0 auto}
.page-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:800;color:var(--txt);letter-spacing:-.4px}
.page-sub{font-size:13px;color:var(--txt2);margin-top:3px}
.page-acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ‚îÄ‚îÄ BUTTONS ‚îÄ‚îÄ */
.btn{padding:8px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all var(--trans);line-height:1.4;white-space:nowrap;font-family:inherit;letter-spacing:.1px}
.btn-acc{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.35)}
.btn-acc:hover{background:var(--acc2);box-shadow:0 2px 12px rgba(139,92,246,.45)}
.btn-sec{background:var(--bg3);color:var(--txt);border:1px solid var(--brd2)}
.btn-sec:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.18)}
.btn-ghost{background:transparent;color:var(--txt2)}
.btn-ghost:hover{background:rgba(255,255,255,.06);color:var(--txt)}
.btn-dan{background:var(--dan);color:#fff}
.btn-dan:hover{background:#dc2626}
.btn-dan-ghost{background:transparent;color:var(--dan)}
.btn-dan-ghost:hover{background:var(--dan-l)}
.btn-suc{background:var(--suc);color:#fff}
.btn-suc:hover{background:#059669}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn-icon{padding:7px;border-radius:7px;aspect-ratio:1}
.hidden{display:none!important}

/* ‚îÄ‚îÄ CARDS ‚îÄ‚îÄ */
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden}
.card+.card{margin-top:10px}
.card-hd{padding:13px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,255,255,.02)}
.card-hd h2{font-size:13px;font-weight:700;color:var(--txt)}
.card-body{padding:18px}

/* ‚îÄ‚îÄ FORMS ‚îÄ‚îÄ */
.form-group{margin-bottom:14px}
.form-group:last-child{margin-bottom:0}
.field-label{display:block;font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
input:not([type=radio]):not([type=checkbox]):not([type=color]),select,textarea{width:100%;padding:8px 11px;border:1px solid var(--brd2);border-radius:var(--r);font-size:13px;background:var(--bg3);color:var(--txt);outline:none;transition:border-color var(--trans),box-shadow var(--trans);font-family:inherit}
input:not([type=radio]):not([type=checkbox]):not([type=color]):focus,select:focus,textarea:focus{border-color:var(--acc2);box-shadow:0 0 0 3px rgba(139,92,246,.18)}
select option{background:var(--bg2)}
textarea{resize:vertical;min-height:60px}
.form-grid{display:grid;gap:12px}
.col2{grid-template-columns:1fr 1fr}
.col3{grid-template-columns:1fr 1fr 1fr}
input[type=color]{width:36px;height:32px;padding:2px;border-radius:6px;cursor:pointer;border:1px solid var(--brd2);background:var(--bg3)}

/* ‚îÄ‚îÄ MODAL ‚îÄ‚îÄ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rl);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shl);animation:slideUp .18s ease}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-lg{max-width:700px}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;border-radius:var(--rl) var(--rl) 0 0}
.modal-header h3{font-size:16px;font-weight:700;color:var(--txt)}
.modal-body{padding:18px 20px}
.modal-footer{padding:13px 20px;border-top:1px solid var(--brd);display:flex;gap:8px;justify-content:flex-end;background:rgba(255,255,255,.02);border-radius:0 0 var(--rl) var(--rl)}
.close-btn{width:28px;height:28px;border-radius:7px;border:none;background:var(--bg3);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--trans);flex-shrink:0}
.close-btn:hover{background:var(--dan-l);color:var(--dan)}

/* ‚îÄ‚îÄ TABS ‚îÄ‚îÄ */
.mtabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:16px}
.mtab{flex:1;padding:6px 10px;border:none;background:transparent;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--txt2);transition:all var(--trans);font-family:inherit;text-align:center}
.mtab.active{background:var(--bg2);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* ‚îÄ‚îÄ TOAST ‚îÄ‚îÄ */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--bg3);color:var(--txt);padding:10px 14px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:var(--shl);animation:toastIn .15s ease;max-width:280px;display:flex;align-items:center;gap:8px;border:1px solid var(--brd2)}
.toast.ok{background:#064e3b;border-color:rgba(16,185,129,.3);color:#a7f3d0}
.toast.err{background:#450a0a;border-color:rgba(239,68,68,.3);color:#fca5a5}
@keyframes toastIn{from{transform:translateX(10px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ‚îÄ‚îÄ BADGES ‚îÄ‚îÄ */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px}
.badge-ok{background:var(--suc-l);color:#34d399}
.badge-war{background:var(--war-l);color:var(--war)}
.badge-open{background:rgba(255,255,255,.06);color:var(--txt3)}
.badge-acc{background:var(--acc-l);color:var(--acc2)}
.badge-draft{background:rgba(255,255,255,.06);color:var(--txt3);border:1px solid var(--brd)}
.badge-pub{background:var(--suc-l);color:#34d399}

/* ‚îÄ‚îÄ AVATAR ‚îÄ‚îÄ */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0;font-size:11px}
.av-lg{width:38px;height:38px;font-size:13px}
.av-md{width:28px;height:28px;font-size:10px}
.av-sm{width:22px;height:22px;font-size:8px}

/* ‚îÄ‚îÄ SEARCH ‚îÄ‚îÄ */
.search-bar{display:flex;align-items:center;gap:7px;border:1px solid var(--brd2);border-radius:var(--r);background:var(--bg3);padding:0 10px;max-width:240px;transition:border-color var(--trans)}
.search-bar:focus-within{border-color:var(--acc2);box-shadow:0 0 0 3px rgba(139,92,246,.15)}
.search-bar input{border:none!important;background:transparent!important;padding:7px 0!important;flex:1;min-width:0;box-shadow:none!important;outline:none;color:var(--txt)}
.search-icon{color:var(--txt3);flex-shrink:0}

/* ‚îÄ‚îÄ PERSONS ‚îÄ‚îÄ */
.persons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.person-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);padding:14px;display:flex;align-items:flex-start;gap:11px;transition:all var(--trans);cursor:pointer}
.person-card:hover{border-color:var(--brd2);background:var(--bg3);transform:translateY(-1px);box-shadow:var(--shm)}
.pc-name{font-size:13px;font-weight:700;color:var(--txt)}
.pc-role{font-size:11px;color:var(--txt3);margin-top:1px}
.pc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}

/* ‚îÄ‚îÄ GROUPS ‚îÄ‚îÄ */
.group-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden}
.group-card+.group-card{margin-top:10px}
.group-hd{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--brd);background:rgba(255,255,255,.02)}
.group-color-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.dienst-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--brd)}
.dienst-row:last-child{border-bottom:none}

/* ‚îÄ‚îÄ SCHICHT CARDS ‚îÄ‚îÄ */
.schicht-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;margin-bottom:10px;transition:all var(--trans)}
.schicht-card:hover{border-color:var(--brd2)}
.schicht-card-hd{padding:14px 18px;display:flex;align-items:flex-start;gap:12px;border-bottom:1px solid var(--brd)}
.schicht-date{font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.3px;text-transform:uppercase;margin-bottom:2px}
.schicht-name{font-size:15px;font-weight:700;color:var(--txt)}
.schicht-time{font-size:12px;color:var(--txt3)}
.schicht-body{padding:14px 18px}
.slot-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.slot-row:last-child{border-bottom:none}
.slot-dienst{font-size:12px;font-weight:600;color:var(--txt2);width:110px;flex-shrink:0}
.slot-person{flex:1;display:flex;align-items:center;gap:8px}
.slot-empty{font-size:12px;color:var(--txt3);font-style:italic}
.slot-actions{display:flex;gap:4px}
.group-section-label{font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:1px;text-transform:uppercase;padding:8px 0 4px;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:4px}

/* ‚îÄ‚îÄ TOOLBAR ‚îÄ‚îÄ */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}

/* ‚îÄ‚îÄ PERIOD BAR ‚îÄ‚îÄ */
.period-bar{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);padding:6px 12px}
.period-bar label{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.period-bar input{width:130px;border:none;background:transparent;padding:2px 4px;font-size:13px;color:var(--txt)}
.period-bar input:focus{box-shadow:none;border:none}

/* ‚îÄ‚îÄ CHECKLIST ‚îÄ‚îÄ */
.check-row{display:flex;align-items:center;gap:9px;padding:5px 0}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--acc2);cursor:pointer}
.check-row label{font-size:13px;color:var(--txt2);cursor:pointer}

/* ‚îÄ‚îÄ SHARE ‚îÄ‚îÄ */
.share-preview{border:1px solid var(--brd);border-radius:var(--r);background:var(--bg3);padding:12px;font-family:monospace;font-size:12px;color:var(--txt2);white-space:pre-wrap;max-height:200px;overflow-y:auto;line-height:1.6}
.copy-row{display:flex;gap:8px;align-items:center;margin-top:8px}

/* ‚îÄ‚îÄ VORLAGE ‚îÄ‚îÄ */
.vorl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.vorl-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);padding:14px;transition:all var(--trans);cursor:pointer}
.vorl-card:hover{border-color:var(--acc2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(124,58,237,.2)}

/* ‚îÄ‚îÄ STATS ‚îÄ‚îÄ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);padding:16px;text-align:center}
.stat-num{font-size:30px;font-weight:900;color:var(--acc2);letter-spacing:-1px;line-height:1}
.stat-lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-top:5px}

/* ‚îÄ‚îÄ DOT ‚îÄ‚îÄ */
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot-suc{background:var(--suc)}
.dot-war{background:var(--war)}
.dot-dan{background:var(--dan)}
.dot-gray{background:var(--txt3)}
.dot-acc{background:var(--acc2)}

/* ‚îÄ‚îÄ EMPTY ‚îÄ‚îÄ */
.empty{text-align:center;padding:56px 24px;color:var(--txt3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:15px;font-weight:600;color:var(--txt2);margin-bottom:6px}
.empty-sub{font-size:13px}

/* ‚îÄ‚îÄ DIVIDER ‚îÄ‚îÄ */
.divider{height:1px;background:var(--brd);margin:16px 0}

/* ‚îÄ‚îÄ WISH ROW ‚îÄ‚îÄ */
.wish-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.wish-row:last-child{border-bottom:none}
.abs-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);border:1px solid var(--brd);margin-bottom:6px;background:var(--bg3);transition:all var(--trans)}
.abs-row:hover{border-color:var(--brd2)}

/* ‚îÄ‚îÄ PALETTE SWATCH ‚îÄ‚îÄ */
.swatch{width:26px;height:26px;border-radius:6px;cursor:pointer;transition:all var(--trans);flex-shrink:0;border:2px solid transparent}
.swatch:hover{transform:scale(1.15)}
.swatch.sel{border-color:#fff!important}

/* ‚îÄ‚îÄ SYNC ‚îÄ‚îÄ */
.sync-preview{font-family:monospace;font-size:11px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);padding:12px;word-break:break-all;color:var(--txt2);max-height:120px;overflow-y:auto}

/* ‚îÄ‚îÄ RESPONSIVE ‚îÄ‚îÄ */
@media(max-width:600px){
  .content{padding:16px 14px}
  .col2,.col3{grid-template-columns:1fr}
  .persons-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap" style="display:none">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">R3</div>
      <div>
        <div class="login-logo-text">Dienstplan</div>
        <div style="font-size:11px;color:var(--txt3)">Admin-Bereich</div>
      </div>
    </div>
    <div class="login-title">Willkommen zur√ºck</div>
    <div class="login-sub">Gib deinen Admin-PIN ein, um fortzufahren.</div>
    <div class="form-group">
      <label class="field-label">Admin-PIN</label>
      <input type="password" id="login-pin" maxlength="4" placeholder="‚Ä¢‚Ä¢‚Ä¢‚Ä¢"
        style="letter-spacing:6px;font-size:20px;text-align:center"
        oninput="if(this.value.length===4)doLogin()"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-acc" style="width:100%;justify-content:center;margin-top:4px" onclick="doLogin()">Einloggen</button>
    <div id="login-err" style="display:none;margin-top:10px;text-align:center;font-size:12px;color:var(--dan)">Falscher PIN. Bitte erneut versuchen.</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="nav-logo">
      <div class="nav-logo-icon">R3</div>
      <div class="nav-logo-name">Dienstplan</div>
    </div>
    <div class="nav-tabs" id="nav-tabs"></div>
    <div class="nav-sep"></div>
    <div class="nav-right" id="nav-right"></div>
  </nav>
  <!-- PAGE -->
  <div class="content" id="page-content"></div>
</div>

<!-- MODAL -->
<div id="mo" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div id="mc" class="modal"></div>
</div>
<div class="toast-wrap" id="tc"></div>

<script>
/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   DATA

        {id:'d1',name:'Licht'},{id:'d2',name:'MAZ'},{id:'d3',name:'TON'},{id:'d4',name:'PM'},{id:'d5',name:'Stage'}

      {id:'g3',name:'People',color:'#10b981',dienste:[

      ]},

    ],
    templates:[],
    schichten:[],

  };
}

function loadDB(){
  try{ db=JSON.parse(localStorage.getItem(DBKEY))||defaultDB(); }
  catch{ db=defaultDB(); }
  if(!db.meta) db.meta={adminPin:'1234'};
  if(!db.absences) db.absences=[];
  if(!db.groups) db.groups=defaultDB().groups;
  if(!db.templates) db.templates=[];
}
function saveDB(){ localStorage.setItem(DBKEY,JSON.stringify(db)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   AUTH
‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
function init(){
  loadDB();
  if(sessionStorage.getItem(SESSKEY)==='1'){ authed=true; showApp(); }
  else showLogin();
}

function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  setTimeout(()=>document.getElementById('login-pin')?.focus(),100);
}

function doLogin(){
  const pin=document.getElementById('login-pin').value;
  const err=document.getElementById('login-err');
  if(pin===db.meta.adminPin){
    authed=true;
    sessionStorage.setItem(SESSKEY,'1');
    err.style.display='none';
    showApp();
  } else {
    err.style.display='block';
    document.getElementById('login-pin').value='';
    document.getElementById('login-pin').focus();
  }
}

function logout(){
  authed=false;
  sessionStorage.removeItem(SESSKEY);
  showLogin();
}

let currentView='dienstplan';

const VIEWS=[
  {id:'dienstplan',label:'Dienstplan'},
  {id:'personen',label:'Personen'},
  {id:'gruppen',label:'Gruppen'},
  {id:'vorlagen',label:'Vorlagen'},
  {id:'statistik',label:'Statistik'},
  {id:'einstellungen',label:'Einstellungen'},
];

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  renderNav();
  showView(currentView);
}

function renderNav(){
  document.getElementById('nav-tabs').innerHTML=VIEWS.map(v=>`
    <button class="nav-tab${currentView===v.id?' active':''}" onclick="showView('${v.id}')">${v.label}</button>
  `).join('');
  document.getElementById('nav-right').innerHTML=`
    <button class="btn btn-ghost btn-sm" onclick="logout()" style="font-size:12px;color:var(--txt3)">Abmelden</button>`;
}

function showView(v){
  currentView=v;
  renderNav();
  const renders={
    dienstplan:renderDienstplan,
    personen:renderPersonen,
    gruppen:renderGruppen,
    vorlagen:renderVorlagen,
    statistik:renderStatistik,
    einstellungen:renderEinstellungen,
  };
  (renders[v]||renderDienstplan)();
}

let personSearch='';

function renderPersonen(){
  document.getElementById('page-content').innerHTML=`
    <div class="page-hd">
      <div>
        <div class="page-title">Personen</div>
        <div class="page-sub">${db.persons.length} Personen angelegt</div>
      </div>
      <div class="page-acts">
        <div class="search-bar">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13.5" y1="13.5" x2="18" y2="18"/></svg>
          <input type="text" placeholder="Suchen‚Ä¶" value="${esc(personSearch)}" oninput="personSearch=this.value;renderPersonsList()">
        </div>
        <button class="btn btn-acc btn-sm" onclick="openPersonModal()">+ Person</button>
      </div>
    </div>
    <div id="persons-list"></div>`;
  renderPersonsList();
}

function renderPersonsList(){
  const q=personSearch.toLowerCase();
  const filtered=db.persons.filter(p=>!q||p.name.toLowerCase().includes(q)||(p.role||'').toLowerCase().includes(q));
  const el=document.getElementById('persons-list');
  if(!el) return;
  if(!filtered.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">üë§</div><div class="empty-title">${personSearch?'Keine Treffer':'Noch keine Personen'}</div><div class="empty-sub">${personSearch?'Anderen Suchbegriff versuchen.':'Lege die erste Person an.'}</div></div>`;
    return;
  }
  el.innerHTML=`<div class="persons-grid">${filtered.map(renderPersonCard).join('')}</div>`;
}

function renderPersonCard(p){
  const quals=(p.qualifications||[]).map(did=>{
    for(const g of db.groups) for(const d of(g.dienste||[])) if(d.id===did) return `<span class="tag" style="background:${g.color}22;color:${g.color}">${esc(d.name)}</span>`;
    return '';
  }).join('');
  return `<div class="person-card" onclick="openPersonModal('${p.id}')">
    <div class="av av-lg" style="background:${p.color||'#6366f1'}">${initials(p.name)}</div>
    <div style="flex:1;min-width:0">
      <div class="pc-name">${esc(p.name)}</div>
      <div class="pc-role">${esc(p.role||'Mitarbeiter')}${p.email?` ¬∑ <span style="font-size:10px">${esc(p.email)}</span>`:''}</div>
      ${quals?`<div class="pc-tags">${quals}</div>`:''}
    </div>
  </div>`;
}

function openPersonModal(id){
  const p=id?db.persons.find(x=>x.id===id):null;
  const qualCbs=db.groups.map(g=>`
    <div style="margin-bottom:10px">
      <div style="font-size:10px;font-weight:800;color:${g.color};text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px">${esc(g.name)}</div>
      ${(g.dienste||[]).map(d=>`
        <div class="check-row">
          <input type="checkbox" id="q_${d.id}" ${(p?.qualifications||[]).includes(d.id)?'checked':''}>
          <label for="q_${d.id}">${esc(d.name)}</label>
        </div>`).join('')}
    </div>`).join('');
  const cc=p?.color||'#6366f1';
  const PAL=['#6366f1','#8b5cf6','#a855f7','#ec4899','#e11d48','#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#10b981','#14b8a6','#06b6d4','#3b82f6','#0ea5e9','#475569'];
  window._pc=cc;
  openModal(`
    <div class="modal-header"><h3>${p?'Person bearbeiten':'Neue Person'}</h3><button class="close-btn" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="field-label">Name</label><input id="pm-name" value="${esc(p?.name||'')}"></div>
      <div class="form-group"><label class="field-label">Farbe</label>
        <div style="display:flex;flex-wrap:wrap;gap:5px;padding:10px;border:1px solid var(--brd);border-radius:var(--r);background:var(--bg3)">
          ${PAL.map(c=>`<div class="swatch${c===cc?' sel':''}" id="sw_${c.slice(1)}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('')}
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
          <div id="pm-cprev" style="width:26px;height:26px;border-radius:6px;background:${cc};border:1px solid var(--brd);flex-shrink:0"></div>
          <span id="pm-cval" style="font-size:12px;font-family:monospace;color:var(--txt2)">${cc}</span>
          <input type="color" id="pm-cust" value="${cc}" style="width:30px;height:26px" onchange="pickColor(this.value)" title="Eigene Farbe">
        </div>
      </div>
      <div class="form-grid col2">
        <div class="form-group"><label class="field-label">Rolle</label>
          <select id="pm-role">${['Mitarbeiter','Assistenz','Trainee','Leiter'].map(r=>`<option${(p?.role||'Mitarbeiter')===r?' selected':''}>${r}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label class="field-label">E-Mail</label><input id="pm-email" type="email" value="${esc(p?.email||'')}"></div>
      </div>
      <div class="form-group"><label class="field-label">Notizen</label><textarea id="pm-notes" rows="2">${esc(p?.notes||'')}</textarea></div>
      <div class="form-group"><label class="field-label">Qualifikationen</label>
        <div style="max-height:200px;overflow-y:auto;border:1px solid var(--brd);border-radius:var(--r);padding:10px;background:var(--bg3)">${qualCbs}</div>
      </div>
    </div>
    <div class="modal-footer">
      ${p?`<button class="btn btn-dan-ghost btn-sm" onclick="deletePerson('${id}')">L√∂schen</button>`:''}
      <button class="btn btn-sec btn-sm" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-acc btn-sm" onclick="savePerson('${id||''}')">Speichern</button>
    </div>`);
  document.getElementById('pm-name').focus();
}

function pickColor(c){
  window._pc=c;
  document.querySelectorAll('.swatch').forEach(el=>el.classList.remove('sel'));
  const sw=document.getElementById('sw_'+c.slice(1));
  if(sw) sw.classList.add('sel');
  const pv=document.getElementById('pm-cprev'); if(pv) pv.style.background=c;
  const cv=document.getElementById('pm-cval'); if(cv) cv.textContent=c;
  const ci=document.getElementById('pm-cust'); if(ci) ci.value=c;
}

function savePerson(id){
  const name=document.getElementById('pm-name').value.trim();
  if(!name){ toast('Name fehlt','err'); return; }
  const quals=[...document.querySelectorAll('[id^="q_"]:checked')].map(el=>el.id.slice(2));
  const data={name,color:window._pc||'#6366f1',role:document.getElementById('pm-role').value,
    email:document.getElementById('pm-email').value.trim(),
    notes:document.getElementById('pm-notes').value.trim(),qualifications:quals};
  if(id){ Object.assign(db.persons.find(x=>x.id===id),data); }
  else { db.persons.push({id:uid(),...data}); }
  saveDB(); closeModal(); renderPersonsList(); toast('Gespeichert','ok');
  document.querySelector('.page-sub').textContent=`${db.persons.length} Personen angelegt`;
}

function deletePerson(id){
  if(!confirm('Person wirklich l√∂schen?')) return;
  db.persons=db.persons.filter(x=>x.id!==id);
  db.assignments=db.assignments.filter(x=>x.personId!==id);
  db.wishes=db.wishes.filter(x=>x.personId!==id);
  db.absences=db.absences.filter(x=>x.personId!==id);
  saveDB(); closeModal(); renderPersonen(); toast('Gel√∂scht');
}

function renderGruppen(){
  document.getElementById('page-content').innerHTML=`
    <div class="page-hd">
      <div><div class="page-title">Gruppen & Dienste</div><div class="page-sub">Strukturiere dein Team</div></div>
      <div class="page-acts"><button class="btn btn-acc btn-sm" onclick="openGroupModal()">+ Gruppe</button></div>
    </div>
    <div id="groups-list"></div>`;
  renderGroupsList();
}

function renderGroupsList(){
  const el=document.getElementById('groups-list');
  if(!el) return;
  if(!db.groups.length){ el.innerHTML='<div class="empty"><div class="empty-icon">üìã</div><div class="empty-title">Keine Gruppen</div></div>'; return; }
  el.innerHTML=db.groups.map(g=>`
    <div class="group-card">
      <div class="group-hd">
        <div class="group-color-bar" style="background:${g.color}"></div>
        <span style="font-size:13px;font-weight:700;flex:1;color:var(--txt)">${esc(g.name)}</span>
        <span style="font-size:11px;color:var(--txt3);margin-right:8px">${(g.dienste||[]).length} Dienste</span>
        <button class="btn btn-ghost btn-xs" onclick="openGroupModal('${g.id}')">Bearbeiten</button>
        <button class="btn btn-ghost btn-xs" onclick="addDienstToGroup('${g.id}')">+ Dienst</button>
      </div>
      ${(g.dienste||[]).map(d=>`
        <div class="dienst-row">
          <span style="font-size:13px;color:var(--txt)">${esc(d.name)}</span>
          <button class="btn btn-dan-ghost btn-xs" onclick="deleteDienst('${g.id}','${d.id}')">Entfernen</button>
        </div>`).join('')}
      ${!(g.dienste||[]).length?'<div style="padding:10px 16px;font-size:12px;color:var(--txt3)">Keine Dienste</div>':''}
    </div>`).join('');
}

function openGroupModal(id){
  const g=id?db.groups.find(x=>x.id===id):null;
  openModal(`
    <div class="modal-header"><h3>${g?'Gruppe bearbeiten':'Neue Gruppe'}</h3><button class="close-btn" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      <div class="form-grid col2">
        <div class="form-group"><label class="field-label">Name</label><input id="gm-name" value="${esc(g?.name||'')}"></div>
        <div class="form-group"><label class="field-label">Farbe</label><input type="color" id="gm-color" value="${g?.color||'#6366f1'}"></div>
      </div>
    </div>
    <div class="modal-footer">
      ${g?`<button class="btn btn-dan-ghost btn-sm" onclick="deleteGroup('${id}')">L√∂schen</button>`:''}
      <button class="btn btn-sec btn-sm" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-acc btn-sm" onclick="saveGroup('${id||''}')">Speichern</button>
    </div>`);
}

function saveGroup(id){
  const name=document.getElementById('gm-name').value.trim();
  if(!name){ toast('Name fehlt','err'); return; }
  const color=document.getElementById('gm-color').value;
  if(id){ Object.assign(db.groups.find(x=>x.id===id),{name,color}); }
  else { db.groups.push({id:uid(),name,color,dienste:[]}); }
  saveDB(); closeModal(); renderGroupsList(); toast('Gespeichert','ok');
}

function deleteGroup(id){
  if(!confirm('Gruppe l√∂schen?')) return;
  db.groups=db.groups.filter(x=>x.id!==id);
  saveDB(); closeModal(); renderGroupsList();
}

function addDienstToGroup(gid){
  const name=prompt('Name des neuen Dienstes:');
  if(!name?.trim()) return;
  const g=db.groups.find(x=>x.id===gid);
  if(!g) return;
  if(!g.dienste) g.dienste=[];
  g.dienste.push({id:uid(),name:name.trim()});
  saveDB(); renderGroupsList(); toast('Dienst hinzugef√ºgt','ok');
}

function deleteDienst(gid,did){
  const g=db.groups.find(x=>x.id===gid);
  if(!g) return;
  g.dienste=(g.dienste||[]).filter(d=>d.id!==did);
  saveDB(); renderGroupsList();
}

function renderVorlList(){

        <button class="btn btn-dan-ghost btn-xs" onclick="deleteTemplate('${t.id}')">L√∂schen</button>

    </div>`).join('')}</div>`;
}

function openTemplateModal(id){
  const t=id?db.templates.find(x=>x.id===id):null;
  const slotOpts=buildSlotOptions();
  const slotRows=(t?.slots||[]).map(sl=>`
    <div class="dienst-row" id="tsl_${sl.id}">
      <span style="font-size:12px;font-weight:600;color:var(--txt)">${getGroupName(sl.groupId)} / ${getDienstName(sl.dienstId)}</span>
      <button class="btn btn-dan-ghost btn-xs" onclick="removeTSlot('${sl.id}')">&#215;</button>
    </div>`).join('');
  openModal(`
    <div class="modal-header"><h3>${t?'Vorlage bearbeiten':'Neue Vorlage'}</h3><button class="close-btn" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="field-label">Name</label><input id="tm-name" value="${esc(t?.name||'')}"></div>
      <div class="form-grid col2">
        <div class="form-group"><label class="field-label">Start</label><input type="time" id="tm-start" value="${t?.timeStart||''}"></div>

      </div>
      <div class="form-group"><label class="field-label">Slots</label>
        <div id="tm-slots" style="border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:8px;background:var(--bg3)">${slotRows||'<div style="padding:10px;font-size:12px;color:var(--txt3)">Noch keine Slots</div>'}</div>
        <div style="display:flex;gap:8px">
          <select id="tm-slot-sel" style="flex:1">${slotOpts}</select>
          <button class="btn btn-sec btn-sm" onclick="addTSlot()">Hinzuf√ºgen</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      ${t?`<button class="btn btn-dan-ghost btn-sm" onclick="deleteTemplate('${id}');closeModal()">L√∂schen</button>`:''}
      <button class="btn btn-sec btn-sm" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-acc btn-sm" onclick="saveTemplate('${id||''}')">Speichern</button>
    </div>`,'modal-lg');
  window._tSlots=JSON.parse(JSON.stringify(t?.slots||[]));
}

function buildSlotOptions(){
  return db.groups.map(g=>`<optgroup label="${esc(g.name)}">${(g.dienste||[]).map(d=>`<option value="${g.id}|${d.id}">${esc(d.name)}</option>`).join('')}</optgroup>`).join('');
}

function addTSlot(){
  const val=document.getElementById('tm-slot-sel').value;
  if(!val) return;
  const [groupId,dienstId]=val.split('|');
  const slot={id:uid(),groupId,dienstId};
  window._tSlots.push(slot);
  const cont=document.getElementById('tm-slots');
  const empty=cont.querySelector('[style*="color:var(--txt3)"]');
  if(empty) empty.remove();
  const row=document.createElement('div');
  row.className='dienst-row'; row.id=`tsl_${slot.id}`;
  row.innerHTML=`<span style="font-size:12px;font-weight:600;color:var(--txt)">${getGroupName(groupId)} / ${getDienstName(dienstId)}</span><button class="btn btn-dan-ghost btn-xs" onclick="removeTSlot('${slot.id}')">&#215;</button>`;
  cont.appendChild(row);
}

function removeTSlot(sid){
  window._tSlots=(window._tSlots||[]).filter(s=>s.id!==sid);
  document.getElementById('tsl_'+sid)?.remove();
}

function saveTemplate(id){
  const name=document.getElementById('tm-name').value.trim();
  if(!name){ toast('Name fehlt','err'); return; }
  const data={name,timeStart:document.getElementById('tm-start').value,timeEnd:document.getElementById('tm-end').value,slots:window._tSlots||[]};
  if(id){ Object.assign(db.templates.find(x=>x.id===id),data); }
  else { db.templates.push({id:uid(),...data}); }
  saveDB(); closeModal(); renderVorlList(); toast('Vorlage gespeichert','ok');
}

function deleteTemplate(id){
  db.templates=db.templates.filter(x=>x.id!==id);
  saveDB(); renderVorlList(); toast('Gel√∂scht');
}

function useTemplate(tid){
  openSchichtModal(null,tid);
}

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   VIEW: DIENSTPLAN
‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
let dpFilter={from:'',to:''};

function renderDienstplan(){
  document.getElementById('page-content').innerHTML=`
    <div class="page-hd">
      <div><div class="page-title">Dienstplan</div><div class="page-sub">${db.schichten.length} Schichten</div></div>
      <div class="page-acts">
        <button class="btn btn-sec btn-sm" onclick="openAutoModal()">Auto-Einteilung</button>
        <button class="btn btn-sec btn-sm" onclick="openSharePeriodModal()">Teilen</button>
        <button class="btn btn-acc btn-sm" onclick="openSchichtModal()">+ Schicht</button>
      </div>
    </div>
    <div class="toolbar">
      <div class="period-bar">
        <label>Von</label><input type="date" value="${dpFilter.from}" onchange="dpFilter.from=this.value;renderSchichtenList()">
        <label style="margin-left:8px">Bis</label><input type="date" value="${dpFilter.to}" onchange="dpFilter.to=this.value;renderSchichtenList()">
      </div>
      <button class="btn btn-ghost btn-sm" onclick="dpFilter={from:'',to:''};renderSchichtenList()">Reset</button>
    </div>
    <div id="schichten-list"></div>`;
  renderSchichtenList();
}

function renderSchichtenList(){
  const el=document.getElementById('schichten-list');
  if(!el) return;
  let list=[...db.schichten];
  if(dpFilter.from) list=list.filter(s=>s.date>=dpFilter.from);
  if(dpFilter.to) list=list.filter(s=>s.date<=dpFilter.to);
  list.sort((a,b)=>a.date<b.date?-1:1);
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">üìÖ</div><div class="empty-title">Keine Schichten</div><div class="empty-sub">Erstelle eine neue Schicht oder nutze eine Vorlage.</div></div>';
    return;
  }
  el.innerHTML=list.map(renderSchichtCard).join('');
  document.querySelector('.page-sub').textContent=`${db.schichten.length} Schichten`;
}

function renderSchichtCard(s){
  const grouped=groupSlots(s.slots||[]);
  const totalSlots=(s.slots||[]).length;
  const filled=(s.slots||[]).filter(sl=>db.assignments.some(a=>a.slotId===sl.id)).length;
  const full=filled===totalSlots&&totalSlots>0;

  let slotsHTML='';
  for(const [gid,slots] of Object.entries(grouped)){
    const g=db.groups.find(x=>x.id===gid);
    slotsHTML+=`<div class="group-section-label" style="color:${g?.color||'var(--txt3)'}">${esc(g?.name||gid)}</div>`;
    slotsHTML+=slots.map(sl=>{
      const asgn=db.assignments.find(a=>a.slotId===sl.id);
      const person=asgn?db.persons.find(p=>p.id===asgn.personId):null;
      return `<div class="slot-row">
        <div class="slot-dienst">${esc(getDienstName(sl.dienstId))}</div>
        <div class="slot-person">
          ${person?`<div class="av av-sm" style="background:${person.color||'#6366f1'}">${initials(person.name)}</div><span style="font-size:12px;font-weight:600;color:var(--txt)">${esc(person.name)}</span>`
          :`<span class="slot-empty">Offen</span>`}
        </div>
        <div class="slot-actions">
          <button class="btn btn-ghost btn-xs" onclick="openAssignModal('${s.id}','${sl.id}','${sl.dienstId}')">Zuweisen</button>
          ${asgn?`<button class="btn btn-dan-ghost btn-xs" onclick="removeAssignment('${sl.id}')">&#215;</button>`:''}
        </div>
      </div>`;
    }).join('');
  }

  const wishCount=db.wishes.filter(w=>w.schichtId===s.id).length;

  return `<div class="schicht-card" id="sc_${s.id}">
    <div class="schicht-card-hd">
      <div style="flex:1">
        <div class="schicht-date">${fmtDate(s.date)}</div>
        <div class="schicht-name">${esc(s.name)}</div>
        ${s.timeStart?`<div class="schicht-time" style="margin-top:2px">${s.timeStart}${s.timeEnd?' ‚Äì '+s.timeEnd:''}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        ${s.published?'<span class="badge badge-pub">Ver√∂ffentlicht</span>':'<span class="badge badge-draft">Entwurf</span>'}
        <span class="badge ${full?'badge-ok':'badge-war'}">${filled}/${totalSlots}</span>
        ${wishCount?`<span class="badge badge-acc">${wishCount} W√ºnsche</span>`:''}
        <div style="display:flex;gap:4px;margin-left:4px">
          <button class="btn btn-ghost btn-xs" onclick="openWishModal('${s.id}')">W√ºnsche</button>
          <button class="btn btn-ghost btn-xs" onclick="openShareSchichtModal('${s.id}')">Teilen</button>
          <button class="btn btn-ghost btn-xs" onclick="openSchichtModal('${s.id}')">Bearb.</button>
          ${s.published
            ?`<button class="btn btn-dan-ghost btn-xs" onclick="unpublishSchicht('${s.id}')">Zur√ºckziehen</button>`
            :`<button class="btn btn-suc btn-xs" onclick="publishSchicht('${s.id}')">Ver√∂ffentlichen</button>`}
        </div>
      </div>
    </div>
    <div class="schicht-body">${slotsHTML||'<div style="font-size:12px;color:var(--txt3)">Keine Slots</div>'}</div>
    ${s.notes?`<div style="padding:8px 18px 12px;font-size:12px;color:var(--txt3);border-top:1px solid var(--brd)">${esc(s.notes)}</div>`:''}
  </div>`;
}

function groupSlots(slots){
  const r={};
  for(const sl of slots){ if(!r[sl.groupId]) r[sl.groupId]=[]; r[sl.groupId].push(sl); }
  return r;
}

function openSchichtModal(id,templateId){
  const s=id?db.schichten.find(x=>x.id===id):null;
  const t=templateId?db.templates.find(x=>x.id===templateId):null;
  const slotOpts=buildSlotOptions();
  const existingSlots=s?s.slots:(t?t.slots.map(sl=>({...sl,id:uid(),allowDouble:false,blocked:[]})):[]);
  window._schSlots=JSON.parse(JSON.stringify(existingSlots));
  const slotRows=window._schSlots.map(buildSchSlotRow).join('');
  openModal(`
    <div class="modal-header"><h3>${s?'Schicht bearbeiten':t?'Schicht aus Vorlage':'Neue Schicht'}</h3><button class="close-btn" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      <div class="form-grid col2">
        <div class="form-group"><label class="field-label">Name</label><input id="sm-name" value="${esc(s?.name||t?.name||'')}"></div>
        <div class="form-group"><label class="field-label">Datum</label><input type="date" id="sm-date" value="${s?.date||''}"></div>
      </div>
      <div class="form-grid col2">
        <div class="form-group"><label class="field-label">Start</label><input type="time" id="sm-start" value="${s?.timeStart||t?.timeStart||''}"></div>
        <div class="form-group"><label class="field-label">Ende</label><input type="time" id="sm-end" value="${s?.timeEnd||t?.timeEnd||''}"></div>
      </div>
      <div class="form-group"><label class="field-label">Notizen</label><textarea id="sm-notes" rows="2">${esc(s?.notes||'')}</textarea></div>
      <div class="form-group"><label class="field-label">Slots</label>
        <div id="sm-slots" style="border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:8px;background:var(--bg3)">${slotRows||'<div id="sm-empty" style="padding:10px;font-size:12px;color:var(--txt3)">Noch keine Slots</div>'}</div>
        <div style="display:flex;gap:8px">
          <select id="sm-slot-sel" style="flex:1">${slotOpts}</select>
          <button class="btn btn-sec btn-sm" onclick="addSchSlot()">+ Slot</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      ${s?`<button class="btn btn-dan-ghost btn-sm" onclick="deleteSchicht('${id}')">L√∂schen</button>`:''}
      <button class="btn btn-sec btn-sm" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-acc btn-sm" onclick="saveSchicht('${id||''}')">Speichern</button>
    </div>`,'modal-lg');
}

function buildSchSlotRow(sl){
  const blocked=(sl.blocked||[]).map(pid=>{const p=db.persons.find(x=>x.id===pid);return p?initials(p.name):'?';}).join(', ');
  return `<div class="dienst-row" id="ssl_${sl.id}" style="flex-wrap:wrap;gap:6px">
    <span style="font-size:12px;font-weight:600;color:var(--txt);flex:1">${getGroupName(sl.groupId)} / ${getDienstName(sl.dienstId)}</span>
    <label style="font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:4px;cursor:pointer">
      <input type="checkbox" ${sl.allowDouble?'checked':''} onchange="setSlotDouble('${sl.id}',this.checked)"> Doppel
    </label>
    <button class="btn btn-ghost btn-xs" onclick="openSchBlockModal('${sl.id}')">Gesperrt${blocked?': '+blocked:''}</button>
    <button class="btn btn-dan-ghost btn-xs" onclick="removeSchSlot('${sl.id}')">&#215;</button>
  </div>`;
}

function addSchSlot(){
  const val=document.getElementById('sm-slot-sel').value;
  if(!val) return;
  const [groupId,dienstId]=val.split('|');
  const sl={id:uid(),groupId,dienstId,allowDouble:false,blocked:[]};
  window._schSlots.push(sl);
  const cont=document.getElementById('sm-slots');
  document.getElementById('sm-empty')?.remove();
  const row=document.createElement('div');
  row.innerHTML=buildSchSlotRow(sl);
  cont.appendChild(row.firstElementChild);
}

function removeSchSlot(sid){
  window._schSlots=(window._schSlots||[]).filter(s=>s.id!==sid);
  document.getElementById('ssl_'+sid)?.remove();
}

function setSlotDouble(sid,val){
  const sl=(window._schSlots||[]).find(s=>s.id===sid);
  if(sl) sl.allowDouble=val;
}

function openSchBlockModal(slotId){
  const sl=(window._schSlots||[]).find(s=>s.id===slotId);
  if(!sl) return;
  const names=db.persons.map(p=>`
    <div class="check-row">
      <input type="checkbox" id="blk_${p.id}" ${(sl.blocked||[]).includes(p.id)?'checked':''}>
      <label for="blk_${p.id}">${esc(p.name)}</label>
    </div>`).join('');
  openModal(`
    <div class="modal-header"><h3>Gesperrte Personen</h3><button class="close-btn" onclick="saveSchBlock('${slotId}')">&#215;</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--txt2);margin-bottom:12px">W√§hle Personen, die f√ºr diesen Slot nicht eingeteilt werden k√∂nnen.</p>
      ${names||'<p style="color:var(--txt3)">Keine Personen angelegt.</p>'}
    </div>
    <div class="modal-footer"><button class="btn btn-acc btn-sm" onclick="saveSchBlock('${slotId}')">OK</button></div>`);
}

function saveSchBlock(slotId){
  const sl=(window._schSlots||[]).find(s=>s.id===slotId);
  if(!sl) return;
  sl.blocked=[...document.querySelectorAll('[id^="blk_"]:checked')].map(el=>el.id.slice(4));
  closeModal();
  const btn=document.querySelector(`#ssl_${slotId} button.btn-ghost`);
  if(btn){ const b=(sl.blocked||[]).map(pid=>{const p=db.persons.find(x=>x.id===pid);return p?initials(p.name):'?';}).join(', ');
    btn.textContent='Gesperrt'+(b?': '+b:''); }
}

function saveSchicht(id){
  const name=document.getElementById('sm-name').value.trim();
  const date=document.getElementById('sm-date').value;
  if(!name){ toast('Name fehlt','err'); return; }
  if(!date){ toast('Datum fehlt','err'); return; }
  const data={name,date,timeStart:document.getElementById('sm-start').value,
    timeEnd:document.getElementById('sm-end').value,
    notes:document.getElementById('sm-notes').value.trim(),
    slots:window._schSlots||[]};
  if(id){ Object.assign(db.schichten.find(x=>x.id===id),data); }
  else { db.schichten.push({id:uid(),published:false,...data}); }
  saveDB(); closeModal(); renderSchichtenList(); toast('Schicht gespeichert','ok');
}

function deleteSchicht(id){
  if(!confirm('Schicht l√∂schen?')) return;
  db.schichten=db.schichten.filter(x=>x.id!==id);
  db.assignments=db.assignments.filter(x=>x.schichtId!==id);
  db.wishes=db.wishes.filter(x=>x.schichtId!==id);
  saveDB(); closeModal(); renderSchichtenList();
}

function publishSchicht(id){
  const s=db.schichten.find(x=>x.id===id);
  if(s){ s.published=true; saveDB(); renderSchichtenList(); toast('Ver√∂ffentlicht','ok'); }
}

function unpublishSchicht(id){
  const s=db.schichten.find(x=>x.id===id);
  if(s){ s.published=false; saveDB(); renderSchichtenList(); toast('Zur√ºckgezogen'); }
}

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   ASSIGN MODAL
‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
let _actx={};

function openAssignModal(schichtId,slotId,dienstId){
  const s=db.schichten.find(x=>x.id===schichtId);
  const slot=(s?.slots||[]).find(x=>x.id===slotId);
  const current=db.assignments.find(a=>a.slotId===slotId);
  const currentPerson=current?db.persons.find(p=>p.id===current.personId):null;
  _actx={schichtId,slotId,dienstId};
  const blocked=slot?.blocked||[];
  const inSchicht=db.assignments.filter(a=>a.schichtId===schichtId).map(a=>a.personId);
  const qualified=db.persons.filter(p=>!blocked.includes(p.id)&&(p.qualifications||[]).includes(dienstId));
  const all=db.persons.filter(p=>!blocked.includes(p.id));
  const list=qualified.length?qualified:all;
  const wishes=db.wishes.filter(w=>w.schichtId===schichtId);

  const rows=list.map(p=>{
    const w=wishes.find(w=>w.personId===p.id);
    const already=inSchicht.includes(p.id)&&p.id!==current?.personId;
    const disabled=already&&!slot?.allowDouble;
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);${disabled?'opacity:.35;pointer-events:none':''}">
      <div class="av av-sm" style="background:${p.color||'#6366f1'}">${initials(p.name)}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--txt)">${esc(p.name)}</div>
        <div style="display:flex;gap:6px;margin-top:2px">
          ${w?.type==='frei'?'<span style="color:var(--dan);font-size:10px;font-weight:700">Wunschfrei</span>':''}
          ${w?.type==='dienst'?'<span style="color:var(--suc);font-size:10px;font-weight:700">Wunschdienst</span>':''}
          ${already&&!slot?.allowDouble?'<span style="color:var(--txt3);font-size:10px">Bereits eingeteilt</span>':''}
        </div>
      </div>
      <button class="btn btn-acc btn-xs" onclick="doAssign('${p.id}')">Zuweisen</button>
    </div>`;
  }).join('');

  openModal(`
    <div class="modal-header"><h3>Zuweisung: ${esc(getDienstName(dienstId))}</h3><button class="close-btn" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      ${currentPerson?`<div style="background:var(--suc-l);border-radius:var(--r);padding:10px 12px;margin-bottom:14px;font-size:13px;color:#34d399;border:1px solid rgba(16,185,129,.2)">Aktuell: <strong>${esc(currentPerson.name)}</strong> <button class="btn btn-dan-ghost btn-xs" style="margin-left:8px" onclick="removeAssignment('${slotId}');closeModal()">Entfernen</button></div>`:''}
      ${!qualified.length&&all.length?'<p style="font-size:12px;color:var(--war);margin-bottom:10px">Keine qualifizierten Personen ‚Äì zeige alle.</p>':''}
      <div style="max-height:320px;overflow-y:auto">${rows||'<p style="color:var(--txt3);font-size:13px">Keine Personen verf√ºgbar.</p>'}</div>
    </div>
    <div class="modal-footer"><button class="btn btn-sec btn-sm" onclick="closeModal()">Schlie√üen</button></div>`);
}

function doAssign(personId){
  const {schichtId,slotId}=_actx;
  db.assignments=db.assignments.filter(a=>a.slotId!==slotId);
  db.assignments.push({id:uid(),schichtId,slotId,personId});
  saveDB(); closeModal(); renderSchichtenList(); toast('Zugewiesen','ok');
}

function removeAssignment(slotId){
  db.assignments=db.assignments.filter(a=>a.slotId!==slotId);
  saveDB(); renderSchichtenList(); toast('Zuweisung entfernt');
}

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   WISH MODAL

function openWishModal(schichtId){
  const s=db.schichten.find(x=>x.id===schichtId);
  const wishes=db.wishes.filter(w=>w.schichtId===schichtId);
  const wishRows=wishes.map(w=>{
    const p=db.persons.find(x=>x.id===w.personId);
    return `<div class="wish-row">
      <div class="av av-sm" style="background:${p?.color||'#6366f1'}">${initials(p?.name||'?')}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--txt)">${esc(p?.name||'?')}</div>
        <div style="font-size:11px;font-weight:700;color:${w.type==='frei'?'var(--dan)':'var(--suc)'}">${w.type==='frei'?'Wunschfrei':'Wunschdienst'}${w.note?' ¬∑ '+esc(w.note):''}</div>
      </div>
      <button class="btn btn-dan-ghost btn-xs" onclick="deleteWish('${w.id}','${schichtId}')">&#215;</button>
    </div>`;
  }).join('');
  const personOpts=db.persons.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  openModal(`
    <div class="modal-header"><h3>W√ºnsche: ${esc(s?.name||'')}</h3><button class="close-btn" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      <div style="margin-bottom:14px">${wishRows||'<p style="color:var(--txt3);font-size:13px">Keine W√ºnsche eingetragen.</p>'}</div>
      <div class="divider"></div>
      <div class="form-group"><label class="field-label">Person</label><select id="wm-person">${personOpts}</select></div>
      <div class="form-group"><label class="field-label">Typ</label>
        <select id="wm-type"><option value="frei">Wunschfrei</option><option value="dienst">Wunschdienst</option></select>
      </div>
      <div class="form-group"><label class="field-label">Notiz</label><input id="wm-note" placeholder="Optional‚Ä¶"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sec btn-sm" onclick="closeModal()">Schlie√üen</button>
      <button class="btn btn-acc btn-sm" onclick="saveWish('${schichtId}')">Wunsch speichern</button>
    </div>`);
}

function saveWish(schichtId){
  const personId=document.getElementById('wm-person').value;
  const type=document.getElementById('wm-type').value;
  const note=document.getElementById('wm-note').value.trim();
  db.wishes=db.wishes.filter(w=>!(w.personId===personId&&w.schichtId===schichtId));
  db.wishes.push({id:uid(),schichtId,personId,type,note});
  saveDB(); openWishModal(schichtId); toast('Wunsch gespeichert','ok');
}

function deleteWish(id,schichtId){
  db.wishes=db.wishes.filter(w=>w.id!==id);
  saveDB(); openWishModal(schichtId);
}

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   AUTO-ASSIGN
‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
function openAutoModal(){
  const schichtOpts=db.schichten.sort((a,b)=>a.date<b.date?-1:1).map(s=>`
    <div class="check-row"><input type="checkbox" id="au_${s.id}" checked><label for="au_${s.id}">${fmtDate(s.date)} ‚Äì ${esc(s.name)}</label></div>`).join('');
  openModal(`
    <div class="modal-header"><h3>Auto-Einteilung</h3><button class="close-btn" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="field-label">Schichten</label>
        <div style="max-height:180px;overflow-y:auto;border:1px solid var(--brd);border-radius:var(--r);padding:10px;background:var(--bg3)">${schichtOpts||'<p style="color:var(--txt3);font-size:12px">Keine Schichten</p>'}</div>
      </div>
      <div class="form-group"><label class="field-label">Optionen</label>
        <div class="check-row"><input type="checkbox" id="ao-qual" checked><label for="ao-qual">Nur qualifizierte Personen</label></div>
        <div class="check-row"><input type="checkbox" id="ao-frei" checked><label for="ao-frei">Wunschfrei ber√ºcksichtigen</label></div>
        <div class="check-row"><input type="checkbox" id="ao-ndbl" checked><label for="ao-ndbl">Keine Doppelbesetzung pro Schicht</label></div>
        <div class="check-row"><input type="checkbox" id="ao-fair" checked><label for="ao-fair">Gleichm√§√üige Verteilung</label></div>
        <div class="check-row"><input type="checkbox" id="ao-over"><label for="ao-over">Bestehende Zuweisung √ºberschreiben</label></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sec btn-sm" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-acc btn-sm" onclick="runAuto()">Einteilen</button>
    </div>`);
}

function runAuto(){
  const selSchichten=db.schichten.filter(s=>document.getElementById('au_'+s.id)?.checked);
  const qualOnly=document.getElementById('ao-qual').checked;
  const respFrei=document.getElementById('ao-frei').checked;
  const noDouble=document.getElementById('ao-ndbl').checked;
  const fair=document.getElementById('ao-fair').checked;
  const overwrite=document.getElementById('ao-over').checked;
  const load={};
  for(const p of db.persons) load[p.id]=db.assignments.filter(a=>a.personId===p.id).length;
  let count=0;
  for(const s of selSchichten){
    const inSchicht=new Set(db.assignments.filter(a=>a.schichtId===s.id).map(a=>a.personId));
    const wishes=db.wishes.filter(w=>w.schichtId===s.id);
    for(const slot of (s.slots||[])){
      if(!overwrite&&db.assignments.some(a=>a.slotId===slot.id)) continue;
      if(overwrite) db.assignments=db.assignments.filter(a=>a.slotId!==slot.id);
      const blocked=slot.blocked||[];
      let cands=db.persons.filter(p=>{
        if(blocked.includes(p.id)) return false;
        if(qualOnly&&!(p.qualifications||[]).includes(slot.dienstId)) return false;
        if(respFrei&&wishes.find(w=>w.personId===p.id&&w.type==='frei')) return false;
        if(noDouble&&!slot.allowDouble&&inSchicht.has(p.id)) return false;
        return true;
      });
      if(!cands.length) continue;
      const wd=cands.filter(p=>wishes.find(w=>w.personId===p.id&&w.type==='dienst'));
      if(wd.length) cands=wd;
      if(fair) cands.sort((a,b)=>(load[a.id]||0)-(load[b.id]||0));
      const chosen=cands[0];
      db.assignments.push({id:uid(),schichtId:s.id,slotId:slot.id,personId:chosen.id});
      load[chosen.id]=(load[chosen.id]||0)+1;
      inSchicht.add(chosen.id);
      count++;
    }
  }
  saveDB(); closeModal(); renderSchichtenList(); toast(`${count} Zuweisung(en) erstellt`,'ok');
}

function renderStatistik(){
  document.getElementById('page-content').innerHTML=`
    <div class="page-hd">
      <div><div class="page-title">Statistik</div><div class="page-sub">Eins√§tze & Auslastung</div></div>
      <div class="page-acts">
        <select id="stat-period" onchange="renderStatContent()" style="font-size:13px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--brd2);background:var(--bg3);color:var(--txt)">
          <option value="all">Alle Zeiten</option>
          <option value="30">Letzter Monat</option>
          <option value="90">Letzte 3 Monate</option>
          <option value="365">Letztes Jahr</option>
        </select>
      </div>
    </div>
    <div id="stat-content"></div>`;
  renderStatContent();
}

function renderStatContent(){
  const days=document.getElementById('stat-period')?.value;
  let assignments=db.assignments;
  if(days&&days!=='all'){
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-parseInt(days));
    const cutStr=cutoff.toISOString().slice(0,10);
    const valid=new Set(db.schichten.filter(s=>s.date>=cutStr).map(s=>s.id));
    assignments=assignments.filter(a=>valid.has(a.schichtId));
  }
  const stats=db.persons.map(p=>{
    const pa=assignments.filter(a=>a.personId===p.id);
    const byGroup={};
    for(const a of pa){
      const s=db.schichten.find(x=>x.id===a.schichtId);
      const slot=(s?.slots||[]).find(sl=>sl.id===a.slotId);
      if(slot){ const gid=slot.groupId; byGroup[gid]=(byGroup[gid]||0)+1; }
    }
    return {p,total:pa.length,byGroup};
  }).sort((a,b)=>b.total-a.total);
  const maxTotal=stats[0]?.total||1;
  const totalAll=assignments.length;
  const avgPerson=db.persons.length?Math.round(totalAll/db.persons.length*10)/10:0;

  const summaryHTML=`<div class="stat-grid">
    <div class="stat-card"><div class="stat-num">${db.schichten.length}</div><div class="stat-lbl">Schichten</div></div>
    <div class="stat-card"><div class="stat-num">${totalAll}</div><div class="stat-lbl">Eins√§tze</div></div>
    <div class="stat-card"><div class="stat-num">${db.persons.length}</div><div class="stat-lbl">Personen</div></div>
    <div class="stat-card"><div class="stat-num">${avgPerson}</div><div class="stat-lbl">√ò / Person</div></div>
  </div>`;

  const personRows=stats.map(({p,total,byGroup})=>{
    const pct=Math.round((total/maxTotal)*100);
    const pills=Object.entries(byGroup).map(([gid,cnt])=>{
      const g=db.groups.find(x=>x.id===gid);
      return `<span class="tag" style="background:${g?.color||'#6366f1'}20;color:${g?.color||'#6366f1'}">${esc(g?.name||gid)}: ${cnt}</span>`;
    }).join('');
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)">
      <div class="av av-md" style="background:${p.color||'#6366f1'}">${initials(p.name)}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:5px">
          <span style="font-size:13px;font-weight:700;color:var(--txt)">${esc(p.name)}</span>
          <span style="font-size:11px;color:var(--txt3)">${esc(p.role||'')}</span>
          <span style="font-size:16px;font-weight:900;color:${p.color||'var(--acc2)'};margin-left:auto">${total}√ó</span>
        </div>
        <div style="background:rgba(255,255,255,.06);border-radius:3px;height:5px;margin-bottom:6px;overflow:hidden">
          <div style="background:${p.color||'var(--acc2)'};height:100%;border-radius:3px;width:${pct}%;transition:width .5s ease"></div>
        </div>
        ${pills?`<div style="display:flex;flex-wrap:wrap;gap:3px">${pills}</div>`:'<span style="font-size:11px;color:var(--txt3)">Noch kein Einsatz</span>'}
      </div>
    </div>`;
  }).join('');

  const groupBreakdown=db.groups.map(g=>{
    const cnt=assignments.filter(a=>{
      const s=db.schichten.find(x=>x.id===a.schichtId);
      const sl=(s?.slots||[]).find(sl=>sl.id===a.slotId);
      return sl?.groupId===g.id;
    }).length;
    const pct=Math.round((cnt/(totalAll||1))*100);
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
      <div style="width:10px;height:10px;border-radius:50%;background:${g.color};flex-shrink:0"></div>
      <span style="font-size:13px;font-weight:600;flex:1;color:var(--txt)">${esc(g.name)}</span>
      <span style="font-size:14px;font-weight:800;color:${g.color}">${cnt}√ó</span>
      <span style="font-size:11px;color:var(--txt3);width:32px;text-align:right">${pct}%</span>
    </div>`;
  }).join('');

  document.getElementById('stat-content').innerHTML=`
    ${summaryHTML}
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:12px;align-items:start">
      <div class="card">
        <div class="card-hd"><h2>Eins√§tze pro Person</h2></div>
        <div class="card-body">${personRows||'<p style="color:var(--txt3);font-size:13px">Noch keine Daten.</p>'}</div>
      </div>
      <div class="card">
        <div class="card-hd"><h2>Nach Gruppe</h2></div>
        <div class="card-body">${groupBreakdown||'<p style="color:var(--txt3);font-size:13px">Keine Daten.</p>'}</div>
      </div>
    </div>`;
}

function openShareSchichtModal(schichtId){
  const s=db.schichten.find(x=>x.id===schichtId);
  if(!s) return;
  showShareModal(buildSchichtWA(s), buildEmailHTML([s]));
}

function openSharePeriodModal(){
  const list=db.schichten.filter(s=>s.published).sort((a,b)=>a.date<b.date?-1:1);
  showShareModal(list.map(buildSchichtWA).join('\n\n---\n\n'), buildEmailHTML(list));
}

function showShareModal(waText, htmlEmail){
  openModal(`
    <div class="modal-header"><h3>Dienstplan teilen</h3><button class="close-btn" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      <div class="mtabs">
        <button class="mtab active" onclick="switchShareTab('wa',this)">WhatsApp</button>
        <button class="mtab" onclick="switchShareTab('email',this)">E-Mail HTML</button>
        <button class="mtab" onclick="switchShareTab('remind',this)">Erinnerungen</button>
      </div>
      <div id="share-wa">
        <div class="share-preview">${esc(waText)}</div>
        <div class="copy-row">
          <button class="btn btn-acc btn-sm" onclick="copyText(window._swa,'wa-ok')">Kopieren</button>
          <span id="wa-ok" class="hidden" style="color:var(--suc);font-size:12px">Kopiert!</span>
        </div>
      </div>
      <div id="share-email" class="hidden">
        <div class="share-preview">${esc(htmlEmail)}</div>
        <div class="copy-row">
          <button class="btn btn-acc btn-sm" onclick="copyText(window._shtml,'email-ok')">HTML kopieren</button>

      </div>
      <div id="share-remind" class="hidden">
        <p style="font-size:13px;color:var(--txt2);margin-bottom:12px">E-Mail-Entw√ºrfe f√ºr eingeteilte Personen mit E-Mail-Adresse.</p>
        <div>${buildReminderList(waText)}</div>

    </div>
    <div class="modal-footer"><button class="btn btn-sec btn-sm" onclick="closeModal()">Schlie√üen</button></div>`,'modal-lg');

}

function switchShareTab(tab,btn){
  ['wa','email','remind'].forEach(t=>document.getElementById('share-'+t).classList.add('hidden'));
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  document.getElementById('share-'+tab).classList.remove('hidden');
  btn.classList.add('active');
}

function copyText(text,okId){
  navigator.clipboard.writeText(text||'').then(()=>{
    const ok=document.getElementById(okId);
    if(ok){ ok.classList.remove('hidden'); setTimeout(()=>ok.classList.add('hidden'),2000); }
  });
}

function buildReminderList(bodyText){
  const pids=[...new Set(db.assignments.map(a=>a.personId))];
  const withEmail=pids.map(pid=>db.persons.find(p=>p.id===pid)).filter(p=>p?.email);
  if(!withEmail.length) return '<p style="color:var(--txt3);font-size:13px">Keine Personen mit E-Mail-Adresse.</p>';
  return withEmail.map(p=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
      <div class="av av-sm" style="background:${p.color||'#6366f1'}">${initials(p.name)}</div>
      <div style="flex:1;font-size:13px;font-weight:600;color:var(--txt)">${esc(p.name)}</div>
      <span style="font-size:12px;color:var(--txt3)">${esc(p.email)}</span>
      <a class="btn btn-acc btn-xs" href="mailto:${encodeURIComponent(p.email)}?subject=${encodeURIComponent('Dein Dienstplan')}&body=${encodeURIComponent(bodyText)}" target="_blank">Schreiben</a>
    </div>`).join('');
}

function buildSchichtWA(s){
  const lines=[`*${s.name}*`,`${fmtDate(s.date)}${s.timeStart?' | '+s.timeStart+(s.timeEnd?' ‚Äì '+s.timeEnd:''):''}`];
  const grouped=groupSlots(s.slots||[]);
  for(const [gid,slots] of Object.entries(grouped)){
    const g=db.groups.find(x=>x.id===gid);
    lines.push(`\n*${g?.name||gid}*`);
    for(const sl of slots){
      const asgn=db.assignments.find(a=>a.slotId===sl.id);
      lines.push(`  ${getDienstName(sl.dienstId)}: ${asgn?(db.persons.find(p=>p.id===asgn.personId)?.name||'?'):'Offen'}`);
    }
  }
  return lines.join('\n');
}

function buildEmailHTML(schichten){
  const rows=schichten.map(s=>{
    const grouped=groupSlots(s.slots||[]);
    let sections='';
    for(const [gid,slots] of Object.entries(grouped)){
      const g=db.groups.find(x=>x.id===gid);
      const color=g?.color||'#6366f1';
      sections+=`<tr><td colspan="2" style="padding:10px 12px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:${color};background:#1a1f35">${esc(g?.name||gid)}</td></tr>`;
      for(const sl of slots){
        const asgn=db.assignments.find(a=>a.slotId===sl.id);
        const pname=asgn?(db.persons.find(p=>p.id===asgn.personId)?.name||'?'):'‚Äî';
        const pcolor=asgn?(db.persons.find(p=>p.id===asgn.personId)?.color||'#94a3b8'):'#94a3b8';
        sections+=`<tr>
          <td style="padding:7px 12px;font-size:13px;color:#94a3b8;border-bottom:1px solid #0d1117">${esc(getDienstName(sl.dienstId))}</td>
          <td style="padding:7px 12px;border-bottom:1px solid #0d1117">
            ${asgn?`<span style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#e2e8f0">
              <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${pcolor}"></span>${esc(pname)}</span>`
            :`<span style="font-size:13px;color:#475569;font-style:italic">Offen</span>`}
          </td></tr>`;
      }
    }
    return `<div style="margin-bottom:24px;border-radius:12px;overflow:hidden;border:1px solid #1e2638">
      <div style="background:linear-gradient(135deg,#0d1117,#1e1b4b);padding:16px 18px;color:#fff">
        <div style="font-size:16px;font-weight:800">${esc(s.name)}</div>
        <div style="font-size:13px;color:rgba(255,255,255,.5);margin-top:2px">${fmtDate(s.date)}${s.timeStart?' &middot; '+s.timeStart+(s.timeEnd?' ‚Äì '+s.timeEnd:''):''}</div>
      </div>
      <table style="width:100%;border-collapse:collapse;background:#161b27">${sections}</table>
    </div>`;
  }).join('');

function renderEinstellungen(){

      <div><div class="page-title">Einstellungen</div><div class="page-sub">Konfiguration & Datenverwaltung</div></div>

              <input type="password" id="new-pin" maxlength="4" placeholder="‚Ä¢‚Ä¢‚Ä¢‚Ä¢" style="max-width:120px;letter-spacing:6px;font-size:18px;text-align:center">
              <button class="btn btn-acc btn-sm" onclick="savePin()">Speichern</button>

          <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
            <button class="btn btn-acc btn-sm" onclick="syncExportCode()">Sync-Code generieren</button>
            <button class="btn btn-sec btn-sm" onclick="openSyncPull()">Code importieren</button>
          </div>
          <div id="sync-export-box" style="display:none">
            <label class="field-label">Sync-Code</label>
            <textarea id="sync-export-ta" rows="4" readonly class="sync-preview" style="margin-bottom:8px"></textarea>
            <button class="btn btn-acc btn-sm" onclick="copySyncCode()">Kopieren</button>
            <span id="sync-copy-ok" class="hidden" style="font-size:12px;color:var(--suc);margin-left:8px">Kopiert!</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-hd"><h2>JSON-Export / Import</h2></div>
        <div class="card-body">
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-sec btn-sm" onclick="exportJSON()">JSON exportieren</button>
            <button class="btn btn-sec btn-sm" onclick="document.getElementById('imp-file').click()">JSON importieren</button>
            <input type="file" id="imp-file" accept=".json" class="hidden" onchange="importJSON(this)">
          </div>
        </div>
      </div>
      <div class="card" style="border-color:rgba(239,68,68,.2)">
        <div class="card-hd"><h2 style="color:var(--dan)">Gefahrenzone</h2></div>

          <button class="btn btn-dan btn-sm" onclick="resetData()">Alle Daten l√∂schen</button>

function savePin(){
  const p=document.getElementById('new-pin').value;
  if(p.length!==4||isNaN(p)){ toast('PIN muss 4 Ziffern sein','err'); return; }
  db.meta.adminPin=p; saveDB(); toast('PIN ge√§ndert','ok');
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='r3-dienstplan.json'; a.click();
}

function importJSON(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{ try{ db=JSON.parse(e.target.result); saveDB(); toast('Importiert','ok'); showView(currentView); }catch{ toast('Ung√ºltige Datei','err'); } };
  r.readAsText(file);
}

function resetData(){
  if(!confirm('Alle Daten wirklich l√∂schen? Diese Aktion kann nicht r√ºckg√§ngig gemacht werden.')) return;
  db=defaultDB(); saveDB(); toast('Daten gel√∂scht'); showView('einstellungen');
}

function syncExportCode(){
  try{
    const code=btoa(unescape(encodeURIComponent(JSON.stringify(db))));
    document.getElementById('sync-export-box').style.display='block';
    document.getElementById('sync-export-ta').value=code;
    toast('Code generiert','ok');
  }catch(e){ toast('Fehler','err'); }
}

function copySyncCode(){
  const ta=document.getElementById('sync-export-ta');
  navigator.clipboard.writeText(ta.value).then(()=>{
    const ok=document.getElementById('sync-copy-ok');
    ok.classList.remove('hidden'); setTimeout(()=>ok.classList.add('hidden'),2500);
  });
}

function openSyncPull(){
  openModal(`
    <div class="modal-header"><h3>Sync-Code importieren</h3><button class="close-btn" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--txt2);margin-bottom:12px">F√ºge hier den Sync-Code vom anderen Ger√§t ein.</p>
      <div class="form-group"><label class="field-label">Sync-Code</label>
        <textarea id="sync-code-inp" rows="5" placeholder="Code hier einf√ºgen‚Ä¶" style="font-family:monospace;font-size:11px;word-break:break-all"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sec btn-sm" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-acc btn-sm" onclick="syncPull()">Importieren</button>
    </div>`);
}

function syncPull(){
  const code=document.getElementById('sync-code-inp').value.trim();
  if(!code){ toast('Code fehlt','err'); return; }
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob(code))));
    if(!data.persons||!data.groups) throw new Error();
    db=data; saveDB(); closeModal(); toast('Importiert!','ok'); showView(currentView);
  }catch(e){ toast('Ung√ºltiger Code','err'); }
}

function openModal(html,cls=''){
  const mo=document.getElementById('mo');
  const mc=document.getElementById('mc');
  mc.className='modal '+(cls||'');
  mc.innerHTML=html;
  mo.style.display='flex';
  setTimeout(()=>mc.querySelector('input,select,textarea')?.focus(),80);
}

function closeModal(){
  document.getElementById('mo').style.display='none';
  document.getElementById('mc').innerHTML='';
}

function toast(msg,type=''){
  const tc=document.getElementById('tc');
  const el=document.createElement('div');
  el.className='toast '+(type==='ok'?'ok':type==='err'?'err':'');
  el.textContent=msg;
  tc.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); },2700);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(name){ return String(name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function fmtDate(d){ if(!d) return ''; try{ return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}); }catch{ return d; } }
function getGroupName(gid){ return db.groups.find(g=>g.id===gid)?.name||gid; }
function getDienstName(did){ for(const g of db.groups) for(const d of(g.dienste||[])) if(d.id===did) return d.name; return did; }
